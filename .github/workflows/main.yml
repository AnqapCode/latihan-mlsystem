name: CI/CD MLflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: "MLproject/train_pca.csv"
  TARGET_VAR: "Credit_Score"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v3

      # Setup Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      # Check Env Variables
      - name: Check Env
        run: |
          echo $CSV_URL
      # Install mlflow
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow  
          
      # Run as a mlflow project
      - name: Run mlflow project
        run: |
          # mlflow run MLproject --env-manager=local
          mlflow run . --env-manager=local > run_output.txt 2>&1
          cat run_output.txt
      
      # Get latest run_id
      - name: Get latest MLflow run_id
        run: |
          # RUN_ID=$(ls -td mlruns/0/*/ | head -n 1 | cut -d'/' -f3)
          # echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          # echo "Latest run_id: $RUN_ID"
          
          # Kita mencari di mlruns/0, membuang 'meta.yaml' dan folder 'models'
          # head -n 1 akan mengambil folder ID asli yang paling baru
          RUN_ID=$(ls -t mlruns/0 | grep -vE "meta.yaml|models" | head -n 1)
          
          # Validasi: Jika ID tetap tidak ditemukan atau aneh, kita hentikan proses
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" == "models" ]; then
            echo "Error: Run ID asli tidak ditemukan! Log folder:"
            ls -R mlruns/0
            exit 1
          fi

          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Berhasil mendapatkan Run ID: $RUN_ID"
          
      # Build Docker Model
      - name: Build Docker Model
        run: |
          # mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "cc" 

          
          mlflow models build-docker --model-uri "runs:/${{ env.RUN_ID }}/model" --name "cc"
      
      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Tag the Docker image
      - name: Tag Docker Image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest

      # Push Docker image to Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
