name: CI/CD MLflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Sesuaikan path agar menunjuk ke file di dalam folder MLproject
  CSV_URL: "MLproject/train_pca.csv"
  TARGET_VAR: "Credit_Score"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn joblib

      # Perhatikan: kita menjalankan folder "MLproject"
      - name: Run mlflow project
        run: |
          mlflow run MLproject --env-manager=local
      
      - name: Get latest MLflow run_id
        run: |
          # Mengambil ID asli dengan membuang folder 'models' dan 'meta.yaml'
          RUN_ID=$(ls -t mlruns/0 | grep -vE "meta.yaml|models" | head -n 1)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Ditemukan Run ID: $RUN_ID"
          
      - name: Build Docker Model
        run: |
          # Kita beri nama image "cc" agar konsisten dengan step tag nanti
          mlflow models build-docker --model-uri "runs:/${{ env.RUN_ID }}/model" --name "cc"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and Push Docker Image
        run: |
          # Menggunakan variabel rahasia untuk username agar lebih aman
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
