name: CI/CD MLflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: "MLproject/train_pca.csv"
  TARGET_VAR: "Credit_Score"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v3

      # Setup Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      # Check Env Variables
      - name: Check Env
        run: |
          echo $CSV_URL
      # Install mlflow
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow  
          
      # Run as a mlflow project
      - name: Run mlflow project
        run: |
          # mlflow run MLproject --env-manager=local
          mlflow run . --env-manager=local
      
      # Get latest run_id
      - name: Get latest MLflow run_id
        run: |
          # RUN_ID=$(ls -td mlruns/0/*/ | head -n 1 | cut -d'/' -f3)
          # echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          # echo "Latest run_id: $RUN_ID"
          
          # 1. Cari folder mlruns secara rekursif
          MLRUNS_DIR=$(find . -name "mlruns" -type d -prune | head -n 1)
          echo "Ditemukan folder mlruns di: $MLRUNS_DIR"

          # 2. Cari folder eksperimen terbaru di dalamnya (biasanya folder '0' atau folder angka lainnya)
          # Kita mencari folder dengan nama 32 karakter alfanumerik (format ID MLflow)
          RUN_ID=$(find $MLRUNS_DIR -maxdepth 2 -type d -regextype posix-extended -regex ".*/[a-f0-9]{32}" -printf '%T@ %p\n' | sort -rn | head -n 1 | awk '{print $2}' | xargs basename)

          if [ -z "$RUN_ID" ]; then
            echo "Error: Run ID tidak ditemukan! Pastikan 'mlflow run' sudah berhasil dijalankan sebelumnya."
            # Opsional: tampilkan struktur folder untuk debugging
            ls -R
            exit 1
          fi

          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Berhasil mendapatkan Run ID: $RUN_ID"
          
      # Build Docker Model
      - name: Build Docker Model
        run: |
          # mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "cc" 

          # Menggunakan ${{ env.RUN_ID }} memastikan GitHub mengambil nilai dari GITHUB_ENV
          mlflow models build-docker --model-uri "runs:/${{ env.RUN_ID }}/model" --name "cc"
      
      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Tag the Docker image
      - name: Tag Docker Image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest

      # Push Docker image to Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
